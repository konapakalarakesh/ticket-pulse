
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Pulse — Audit TT Control Tower</title>
<style>
:root {
  --bg: #0a0e1a;
  --card: #111827;
  --border: #1f2937;
  --text: #e5e7eb;
  --muted: #6b7280;
  --accent: #38bdf8;
  --green: #10b981;
  --yellow: #f59e0b;
  --orange: #f97316;
  --red: #ef4444;
  --purple: #a78bfa;
  --radius: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
.header { padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px; }
.header-left { display: flex; align-items: center; gap: 12px; }
.logo { font-size: 28px; }
.brand h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.brand p { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
.header-right { display: flex; align-items: center; gap: 12px; }
.live-badge { display: flex; align-items: center; gap: 6px; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); border-radius: 20px; padding: 4px 12px; font-size: 11px; color: var(--green); font-weight: 600; }
.live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.last-update { font-size: 11px; color: var(--muted); }
.btn { padding: 7px 14px; border-radius: 6px; border: none; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s ease; display: inline-flex; align-items: center; gap: 5px; }
.btn-primary { background: #3b82f6; color: white; }
.btn-primary:hover { background: #2563eb; }
.btn-success { background: var(--green); color: white; }
.btn-success:hover { background: #059669; }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--card); color: var(--text); }
.btn-sm { padding: 4px 9px; font-size: 10px; }

/* Container */
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }

/* Summary Cards */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
.stat-card .label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.stat-card .value { font-size: 24px; font-weight: 700; font-family: 'Courier New', monospace; }
.stat-card.c-total .value { color: var(--accent); }
.stat-card.c-resolved .value { color: var(--green); }
.stat-card.c-open .value { color: var(--yellow); }
.stat-card.c-pending .value { color: var(--orange); }
.stat-card.c-auditors .value { color: var(--purple); }
.stat-card.c-rate .value { color: var(--green); }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--card); border-radius: 8px; padding: 4px; border: 1px solid var(--border); width: fit-content; }
.tab { padding: 7px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; color: var(--muted); border: none; background: none; transition: all 0.15s; }
.tab.active { background: #3b82f6; color: white; }
.tab:hover:not(.active) { color: var(--text); }

/* Sections */
.section { display: none; }
.section.active { display: block; }

/* Charts */
.charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 14px; margin-bottom: 20px; }
.chart-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.chart-box h3 { font-size: 12px; color: var(--muted); margin-bottom: 12px; font-weight: 600; }
.bar-row { margin-bottom: 7px; }
.bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 2px; }
.bar-label .count { color: var(--text); font-weight: 600; font-family: monospace; }
.bar-track { height: 6px; background: #1f2937; border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

/* Process Table */
.process-table { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
.process-table-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
.process-table-header h3 { font-size: 13px; font-weight: 600; }
table { width: 100%; border-collapse: collapse; font-size: 11px; }
th { text-align: left; color: var(--muted); font-weight: 500; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 10px; text-transform: uppercase; letter-spacing: 0.03em; }
td { padding: 8px 12px; color: var(--text); border-bottom: 1px solid #1a1f2e; }
tr:hover td { background: rgba(56,189,248,0.03); }

/* Auditor Cards */
.auditor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
.auditor-header h2 { font-size: 15px; font-weight: 600; }
.auditor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; margin-bottom: 20px; }
.aud-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px; transition: border-color 0.15s; }
.aud-card:hover { border-color: var(--accent); }
.aud-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.aud-name { font-size: 13px; font-weight: 600; color: var(--accent); }
.aud-tasks { font-size: 9px; color: var(--muted); margin-top: 2px; max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.aud-stats { display: flex; gap: 10px; font-size: 10px; color: var(--muted); flex-wrap: wrap; }
.aud-stats .s-val { font-weight: 700; font-family: monospace; }
.aud-stats .s-resolved .s-val { color: var(--green); }
.aud-stats .s-open .s-val { color: var(--yellow); }
.aud-stats .s-pending .s-val { color: var(--orange); }
.aud-stats .s-total .s-val { color: var(--accent); }
.aud-progress { height: 3px; background: #1f2937; border-radius: 3px; margin-top: 8px; overflow: hidden; }
.aud-progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), #34d399); border-radius: 3px; }
.aud-pct { font-size: 10px; color: var(--green); font-weight: 600; font-family: monospace; }

/* Ticket Table */
.ticket-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.ticket-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px; }
.ticket-header h2 { font-size: 14px; font-weight: 600; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.filters select, .filters input { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 5px 9px; color: var(--text); font-size: 11px; outline: none; }
.filters select:focus, .filters input:focus { border-color: var(--accent); }

/* Badges */
.badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; }
.badge-closed { background: #064e3b; color: #6ee7b7; }
.badge-assigned { background: #172554; color: #93c5fd; }
.badge-pending { background: #7c2d12; color: #fdba74; }
.badge-wip { background: #1e1b4b; color: #c4b5fd; }
.badge-unknown { background: #1f2937; color: #6b7280; }
.badge-failed { background: #450a0a; color: #fca5a5; }

.tt-link { color: var(--accent); text-decoration: none; font-family: monospace; font-size: 11px; }
.tt-link:hover { text-decoration: underline; }

/* Empty/Loading */
.empty-state { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

/* Notification */
.toast { position: fixed; top: 16px; right: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 12px; z-index: 999; display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.4); max-width: 320px; }
.toast.ok { border-color: var(--green); color: var(--green); }
.toast.err { border-color: var(--red); color: #fca5a5; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="logo">⚡</div>
    <div class="brand">
      <h1>Ticket Pulse</h1>
      <p>Audit TT Control Tower</p>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div class="last-update" id="lastUpdate">—</div>
    <button class="btn btn-ghost" onclick="exportCSV()">📥 Export</button>
    <button class="btn btn-primary" onclick="loadData()">🔄 Refresh</button>
  </div>
</div>

<div class="container">

  <!-- Summary -->
  <div class="summary-grid">
    <div class="stat-card c-total"><div class="label">Total Tickets</div><div class="value" id="sTotal">—</div></div>
    <div class="stat-card c-resolved"><div class="label">Resolved</div><div class="value" id="sResolved">—</div></div>
    <div class="stat-card c-open"><div class="label">Open</div><div class="value" id="sOpen">—</div></div>
    <div class="stat-card c-pending"><div class="label">Pending</div><div class="value" id="sPending">—</div></div>
    <div class="stat-card c-auditors"><div class="label">Auditors</div><div class="value" id="sAuditors">—</div></div>
    <div class="stat-card c-rate"><div class="label">Resolution %</div><div class="value" id="sRate">—</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('analytics')">📊 Analytics</button>
    <button class="tab" onclick="switchTab('auditors')">👥 Auditors</button>
    <button class="tab" onclick="switchTab('tickets')">📋 All Tickets</button>
  </div>

  <!-- ANALYTICS TAB -->
  <div class="section active" id="sec-analytics">
    <div class="charts-grid" id="chartsGrid"></div>
    <div class="process-table">
      <div class="process-table-header"><h3>📋 Process Breakdown</h3></div>
      <table><thead><tr><th>Process</th><th>Total</th><th>Resolved</th><th>Open</th><th>Pending</th><th>Rate</th><th>Action</th></tr></thead><tbody id="processBody"></tbody></table>
    </div>
  </div>

  <!-- AUDITORS TAB -->
  <div class="section" id="sec-auditors">
    <div class="auditor-header">
      <h2>👥 Auditor Performance</h2>
      <div class="filters">
        <select id="audProcessFilter" onchange="renderAuditors()"><option value="all">All Processes</option></select>
      </div>
    </div>
    <div class="auditor-grid" id="auditorGrid"></div>
  </div>

  <!-- TICKETS TAB -->
  <div class="section" id="sec-tickets">
    <div class="ticket-section">
      <div class="ticket-header">
        <h2>📋 Full Ticket List (<span id="tktCount">0</span>)</h2>
        <div class="filters">
          <select id="fProcess" onchange="renderTickets()"><option value="all">All Processes</option></select>
          <select id="fAuditor" onchange="renderTickets()"><option value="all">All Auditors</option></select>
          <select id="fStatus" onchange="renderTickets()">
            <option value="all">All</option>
            <option value="Closed">Resolved</option>
            <option value="open">Open</option>
            <option value="Pending">Pending</option>
          </select>
          <select id="fBucket" onchange="renderTickets()"><option value="all">All Buckets</option></select>
          <input type="text" id="fSearch" placeholder="Search ID..." oninput="renderTickets()" style="width:130px;" />
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table><thead><tr><th>#</th><th>Ticket</th><th>Auditor</th><th>Process</th><th>Bucket</th><th>Status</th><th>Severity</th><th>Root Cause</th></tr></thead><tbody id="ticketBody"></tbody></table>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let DATA = null;

async function loadData() {
  try {
    const r = await fetch('./data/tickets.json?_=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    DATA = await r.json();
    document.getElementById('lastUpdate').textContent = DATA.last_updated;
    populateFilters();
    renderAll();
    toast('Dashboard refreshed!', 'ok');
  } catch(e) {
    toast('Load failed: ' + e.message + ' — Is refresh.py running?', 'err');
  }
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3500);
}

function switchTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  event.target.classList.add('active');
}

function populateFilters() {
  if (!DATA) return;
  const procs = [...new Set(DATA.tickets.map(t=>t.task).filter(Boolean))].sort();
  const auds = [...new Set(DATA.tickets.map(t=>t.auditor).filter(Boolean))].sort();
  const bkts = [...new Set(DATA.tickets.map(t=>t.bucket).filter(Boolean))].sort();

  const procOpts = '<option value="all">All Processes</option>' + procs.map(p=>'<option>'+p+'</option>').join('');
  document.getElementById('fProcess').innerHTML = procOpts;
  document.getElementById('audProcessFilter').innerHTML = procOpts;
  document.getElementById('fAuditor').innerHTML = '<option value="all">All Auditors</option>' + auds.map(a=>'<option>'+a+'</option>').join('');
  document.getElementById('fBucket').innerHTML = '<option value="all">All Buckets</option>' + bkts.map(b=>'<option>'+b+'</option>').join('');
}

function renderAll() {
  renderSummary();
  renderCharts();
  renderProcessTable();
  renderAuditors();
  renderTickets();
}

function renderSummary() {
  if (!DATA) return;
  const s = DATA.summary;
  document.getElementById('sTotal').textContent = s.total;
  document.getElementById('sResolved').textContent = s.resolved;
  document.getElementById('sOpen').textContent = s.open;
  document.getElementById('sPending').textContent = s.pending;
  document.getElementById('sAuditors').textContent = s.auditor_count;
  document.getElementById('sRate').textContent = s.resolution_pct + '%';
}

function renderCharts() {
  if (!DATA) return;
  const grid = document.getElementById('chartsGrid');

  // Status chart
  const statusColors = {'Closed':'#10b981','Assigned':'#3b82f6','Pending':'#f97316','Work In Progress':'#a78bfa','Researching':'#38bdf8','Fetch Failed':'#ef4444','Unknown':'#4b5563','Timeout':'#dc2626','Parse Error':'#f43f5e'};
  const statusMap = {};
  DATA.tickets.forEach(t => { statusMap[t.status] = (statusMap[t.status]||0)+1; });
  const maxS = Math.max(...Object.values(statusMap), 1);

  let h = '<div class="chart-box"><h3>📊 Status Distribution</h3>';
  Object.entries(statusMap).sort((a,b)=>b[1]-a[1]).forEach(([k,v]) => {
    h += `<div class="bar-row"><div class="bar-label"><span>${k}</span><span class="count">${v}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(v/maxS)*100}%;background:${statusColors[k]||'#4b5563'}"></div></div></div>`;
  });
  h += '</div>';

  // Process chart
  const ts = DATA.task_stats;
  const maxT = Math.max(...Object.values(ts).map(v=>v.total), 1);
  h += '<div class="chart-box"><h3>📈 Tickets by Process</h3>';
  Object.entries(ts).sort((a,b)=>b[1].total-a[1].total).forEach(([k,v]) => {
    h += `<div class="bar-row"><div class="bar-label"><span>${k}</span><span class="count">${v.total}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(v.total/maxT)*100}%;background:var(--accent)"></div></div></div>`;
  });
  h += '</div>';

  // Top Auditors
  const as = DATA.auditor_stats;
  const topAuds = Object.entries(as).sort((a,b)=>b[1].resolved-a[1].resolved).slice(0,8);
  const maxA = Math.max(...topAuds.map(a=>a[1].total), 1);
  h += '<div class="chart-box"><h3>🎯 Top Auditors (by resolved)</h3>';
  topAuds.forEach(([name,d]) => {
    h += `<div class="bar-row"><div class="bar-label"><span>${name}</span><span class="count">${d.resolved}/${d.total}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(d.resolved/maxA)*100}%;background:var(--green)"></div></div></div>`;
  });
  h += '</div>';

  // Bucket chart
  const bs = DATA.bucket_stats;
  const maxB = Math.max(...Object.values(bs).map(v=>v.total), 1);
  h += '<div class="chart-box"><h3>📦 Bucket Distribution</h3>';
  Object.entries(bs).sort((a,b)=>b[1].total-a[1].total).forEach(([k,v]) => {
    h += `<div class="bar-row"><div class="bar-label"><span>${k||'Unknown'}</span><span class="count">${v.total}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(v.total/maxB)*100}%;background:var(--purple)"></div></div></div>`;
  });
  h += '</div>';

  grid.innerHTML = h;
}

function renderProcessTable() {
  if (!DATA) return;
  const body = document.getElementById('processBody');
  const ts = DATA.task_stats;
  let h = '';
  Object.entries(ts).sort((a,b)=>b[1].total-a[1].total).forEach(([proc, d]) => {
    const rate = d.total > 0 ? Math.round((d.resolved/d.total)*100) : 0;
    h += `<tr>
      <td style="font-weight:600;">${proc}</td>
      <td style="font-family:monospace;">${d.total}</td>
      <td style="color:var(--green);font-family:monospace;">${d.resolved}</td>
      <td style="color:var(--yellow);font-family:monospace;">${d.open}</td>
      <td style="color:var(--orange);font-family:monospace;">${d.pending}</td>
      <td><span class="badge ${rate>=80?'badge-closed':rate>=50?'badge-assigned':'badge-failed'}">${rate}%</span></td>
      <td><button class="btn btn-ghost btn-sm" onclick="filterByProcess('${proc}')">View</button></td>
    </tr>`;
  });
  body.innerHTML = h;
}

function renderAuditors() {
  if (!DATA) return;
  const grid = document.getElementById('auditorGrid');
  const procFilter = document.getElementById('audProcessFilter').value;

  // Filter tickets by process
  let tickets = DATA.tickets;
  if (procFilter !== 'all') tickets = tickets.filter(t => t.task === procFilter);

  // Build auditor stats from filtered tickets
  const map = {};
  tickets.forEach(t => {
    if (!t.auditor) return;
    if (!map[t.auditor]) map[t.auditor] = {total:0,resolved:0,open:0,pending:0,tasks:new Set()};
    map[t.auditor].total++;
    map[t.auditor].tasks.add(t.task);
    if (t.status==='Closed') map[t.auditor].resolved++;
    else if (['Assigned','Work In Progress','Researching'].includes(t.status)) map[t.auditor].open++;
    else if (t.status==='Pending') map[t.auditor].pending++;
  });

  let h = '';
  Object.entries(map).sort((a,b)=>b[1].total-a[1].total).forEach(([name, d]) => {
    const pct = d.total > 0 ? Math.round((d.resolved/d.total)*100) : 0;
    const tasks = [...d.tasks].join(', ');
    h += `<div class="aud-card">
      <div class="aud-card-top">
        <div><div class="aud-name">${name}</div><div class="aud-tasks" title="${tasks}">${tasks}</div></div>
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="aud-pct">${pct}%</span>
          <button class="btn btn-ghost btn-sm" onclick="filterByAuditor('${name}')">📋</button>
        </div>
      </div>
      <div class="aud-stats">
        <span class="s-total">Total: <span class="s-val">${d.total}</span></span>
        <span class="s-resolved">Done: <span class="s-val">${d.resolved}</span></span>
        <span class="s-open">Open: <span class="s-val">${d.open}</span></span>
        <span class="s-pending">Pending: <span class="s-val">${d.pending}</span></span>
      </div>
      <div class="aud-progress"><div class="aud-progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  });
  grid.innerHTML = h || '<div class="empty-state">No auditor data</div>';
}

function renderTickets() {
  if (!DATA) return;
  const proc = document.getElementById('fProcess').value;
  const aud = document.getElementById('fAuditor').value;
  const st = document.getElementById('fStatus').value;
  const bkt = document.getElementById('fBucket').value;
  const q = document.getElementById('fSearch').value.toLowerCase();

  let tickets = DATA.tickets.filter(t => {
    if (proc !== 'all' && t.task !== proc) return false;
    if (aud !== 'all' && t.auditor !== aud) return false;
    if (bkt !== 'all' && t.bucket !== bkt) return false;
    if (st !== 'all') {
      if (st === 'open' && !['Assigned','Work In Progress','Researching'].includes(t.status)) return false;
      if (st !== 'open' && t.status !== st) return false;
    }
    if (q && !t.ticket_id.toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('tktCount').textContent = tickets.length;
  const body = document.getElementById('ticketBody');

  let h = '';
  tickets.slice(0, 300).forEach((t, i) => {
    const bc = badgeClass(t.status);
    h += `<tr>
      <td style="color:var(--muted);">${i+1}</td>
      <td><a class="tt-link" href="https://t.corp.amazon.com/${t.ticket_id}" target="_blank">${t.ticket_id}</a></td>
      <td>${t.auditor||'-'}</td>
      <td>${t.task||'-'}</td>
      <td>${t.bucket||'-'}</td>
      <td><span class="badge ${bc}">${t.status}</span></td>
      <td>${t.severity||'-'}</td>
      <td>${t.root_cause||'-'}</td>
    </tr>`;
  });
  body.innerHTML = h || '<tr><td colspan="8" class="empty-state">No tickets found. Run refresh.py first.</td></tr>';
}

function badgeClass(s) {
  if (s === 'Closed') return 'badge-closed';
  if (s === 'Assigned') return 'badge-assigned';
  if (s === 'Pending') return 'badge-pending';
  if (['Work In Progress','Researching'].includes(s)) return 'badge-wip';
  if (['Fetch Failed','Timeout','Parse Error'].includes(s)) return 'badge-failed';
  return 'badge-unknown';
}

function filterByProcess(proc) {
  switchTab('tickets');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab')[2].classList.add('active');
  document.getElementById('fProcess').value = proc;
  renderTickets();
}

function filterByAuditor(aud) {
  switchTab('tickets');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab')[2].classList.add('active');
  document.getElementById('fAuditor').value = aud;
  renderTickets();
}

function exportCSV() {
  if (!DATA) return;
  let csv = 'Ticket ID,Auditor,Process,Bucket,Status,Severity,Resolved By,Root Cause\n';
  DATA.tickets.forEach(t => {
    csv += [t.ticket_id,t.auditor,t.task,t.bucket,t.status,t.severity||'',t.resolved_by||'',t.root_cause||''].map(v=>'"'+(v||'')+'"').join(',') + '\n';
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = 'ticket_pulse_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

// Auto-refresh every 5 min
setInterval(loadData, 300000);

// Load on open
window.addEventListener('DOMContentLoaded', loadData);
</script>
